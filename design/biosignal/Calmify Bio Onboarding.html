<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Calmify — Bio Onboarding</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="calmify.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  /* Material Symbols helper */
  .material-symbols-rounded {
    font-family: 'Material Symbols Rounded';
    font-weight: normal; font-style: normal;
    font-size: 24px; line-height: 1;
    letter-spacing: normal; text-transform: none;
    display: inline-block; white-space: nowrap;
    word-wrap: normal; direction: ltr;
    font-feature-settings: 'liga';
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
  }

  html, body { margin: 0; height: 100%; background: var(--bg); }
  #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  /* ======== Phone-shaped app shell (parity with Meditation) ======== */
  .app {
    width: 100%;
    max-width: 440px;
    min-height: 900px;
    background: var(--bg);
    color: var(--fg);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 700px) {
    .app {
      border-radius: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
      margin: 24px 0;
    }
  }

  /* ======== Header (back · pager dots · skip) ======== */
  .pager-top {
    height: 56px;
    padding: 8px 16px 0;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--fg); border: 0; cursor: pointer;
    transition: background var(--dur-short-2) var(--ease-emphasized);
  }
  .icon-btn:hover { background: var(--bg-elev-2); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn[disabled] { opacity: 0; pointer-events: none; }

  .dots {
    display: flex; justify-content: center; gap: 8px;
  }
  .dots .dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: transparent;
    border: 1.5px solid var(--border);
    transition: all var(--dur-medium-1) var(--ease-emphasized);
  }
  .dots .dot.active {
    background: var(--accent);
    border-color: var(--accent);
    width: 24px;
  }
  .dots .dot.passed {
    background: var(--fg-subtle);
    border-color: var(--fg-subtle);
  }

  .skip-link {
    height: 44px; padding: 0 12px;
    display: inline-flex; align-items: center;
    background: transparent; border: 0; cursor: pointer;
    color: var(--fg-muted);
    font: 500 14px/20px var(--font-sans); letter-spacing: .1px;
    border-radius: 999px;
    transition: background var(--dur-short-2) var(--ease-emphasized), color var(--dur-short-2) var(--ease-emphasized);
  }
  .skip-link:hover { background: var(--bg-elev-2); color: var(--fg); }
  .skip-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ======== Page scroll body ======== */
  .page {
    flex: 1;
    overflow: auto;
    padding: 16px 24px 24px;
    scroll-behavior: smooth;
  }

  /* ======== Typography helpers ======== */
  h1.eyebrow-display {
    font: 600 32px/40px var(--font-display);
    letter-spacing: -.3px;
    margin: 0;
    text-wrap: pretty;
  }
  .lede {
    color: var(--fg-subtle);
    font: 400 16px/26px var(--font-sans);
    letter-spacing: .15px;
    margin-top: 12px;
    max-width: 380px;
    text-wrap: pretty;
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font: 600 11px/14px var(--font-sans);
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--accent);
  }
  .eyebrow .material-symbols-rounded { font-size: 14px; }

  /* ======== Cards ======== */
  .card {
    background: var(--bg-elev-1);
    border-radius: var(--radius-2xl);
    padding: var(--space-xl);
  }
  .card + .card { margin-top: 12px; }
  .card-title { font: 600 17px/24px var(--font-sans); color: var(--fg); }
  .card-sub { font: 400 13px/20px var(--font-sans); color: var(--fg-subtle); margin-top: 4px; }

  /* ======== Footer (fixed bottom CTA) ======== */
  .footer {
    flex-shrink: 0;
    padding: 16px 24px calc(20px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 70%, rgba(15,15,15,0));
    display: flex; flex-direction: column; gap: 8px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0 24px; min-height: 52px;
    border-radius: var(--radius-xl);
    border: 0; cursor: pointer;
    font: 500 15px/20px var(--font-sans); letter-spacing: .1px;
    background: var(--bg-elev-2); color: var(--fg);
    transition: background var(--dur-short-2) var(--ease-emphasized),
                transform var(--dur-short-1) var(--ease-emphasized);
    width: 100%;
  }
  .btn:hover { background: var(--bg-elev-3); }
  .btn:active { transform: scale(0.985); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary { background: var(--accent); color: var(--fg-on-accent); }
  .btn-primary:hover { background: var(--seed-sage-light); }
  .btn-primary:active { background: var(--accent-pressed); }
  .btn-text {
    background: transparent;
    color: var(--fg-muted);
    min-height: 48px;
    font: 500 14px/20px var(--font-sans);
  }
  .btn-text:hover { background: var(--accent-alpha-08); color: var(--fg); }

  /* ======== Step 1 — Empathic intro: breath-waveform visual ======== */
  .breath-visual {
    position: relative;
    height: 220px;
    margin: 24px -8px 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border-radius: var(--radius-2xl);
    background: radial-gradient(ellipse at center, rgba(76,175,125,0.10), rgba(76,175,125,0) 65%);
  }
  .breath-visual svg { width: 100%; height: 100%; display: block; }
  .breath-wave {
    stroke: var(--accent);
    stroke-width: 1.5;
    fill: none;
    opacity: 0.85;
  }
  .breath-wave.faint { stroke: var(--accent); opacity: 0.25; stroke-width: 1; }
  .breath-bead {
    fill: var(--accent-bright);
    filter: drop-shadow(0 0 12px rgba(168,240,203,0.7));
  }

  /* ======== Step 2 — Data type toggle rows ======== */
  .data-list {
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .data-row {
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    column-gap: 12px;
    align-items: center;
    padding: 14px 8px;
    border-radius: var(--radius-lg);
    transition: background var(--dur-short-2) var(--ease-emphasized);
  }
  .data-row:hover { background: var(--bg-elev-2); }

  .data-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--bg-elev-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
    flex-shrink: 0;
  }
  .data-row.on .data-icon {
    background: var(--accent-alpha-12);
    color: var(--accent);
  }
  .data-icon .material-symbols-rounded { font-size: 22px; }

  .data-meta { min-width: 0; }
  .data-meta .name {
    font: 500 15px/20px var(--font-sans);
    color: var(--fg);
    letter-spacing: .1px;
  }
  .data-meta .why {
    font: 400 12px/18px var(--font-sans);
    color: var(--fg-subtle);
    margin-top: 2px;
    text-wrap: pretty;
  }

  .info-btn {
    width: 32px; height: 32px;
    border-radius: 999px;
    background: transparent; border: 0; cursor: pointer;
    color: var(--fg-subtle);
    display: flex; align-items: center; justify-content: center;
    transition: background var(--dur-short-2) var(--ease-emphasized), color var(--dur-short-2) var(--ease-emphasized);
  }
  .info-btn:hover { background: var(--bg-elev-3); color: var(--fg); }
  .info-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .info-btn .material-symbols-rounded { font-size: 18px; }

  /* iOS-style switch — 44px tall hit target, sage accent */
  .switch {
    position: relative;
    width: 48px; height: 28px;
    flex-shrink: 0;
    background: var(--bg-elev-3);
    border-radius: 999px;
    cursor: pointer;
    border: 0;
    padding: 0;
    transition: background var(--dur-medium-1) var(--ease-emphasized);
  }
  .switch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .switch::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--fg);
    transition: transform var(--dur-medium-1) var(--ease-emphasized), background var(--dur-short-2) var(--ease-emphasized);
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(20px); background: #FFFFFF; }
  /* Enlarge tap target without growing the visual */
  .switch-wrap {
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Inline tooltip / accordion explainer */
  .info-panel {
    grid-column: 1 / -1;
    margin-top: 8px;
    padding: 12px 14px;
    background: var(--bg-elev-2);
    border-radius: var(--radius-md);
    color: var(--fg-subtle);
    font: 400 13px/20px var(--font-sans);
    letter-spacing: .15px;
    border-left: 2px solid var(--accent);
  }

  /* All-on quick toggle */
  .quick-toggle {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    margin-top: 12px;
    border-radius: var(--radius-lg);
    background: var(--bg-elev-2);
  }
  .quick-toggle .qtxt {
    font: 500 13px/18px var(--font-sans);
    color: var(--fg);
  }
  .quick-toggle .qsub {
    font: 400 12px/16px var(--font-sans);
    color: var(--fg-subtle);
    margin-top: 2px;
  }

  /* ======== Step 3 — Narrative use-case cards ======== */
  .use-card {
    background: var(--bg-elev-1);
    border-radius: var(--radius-2xl);
    padding: 20px;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 16px;
    align-items: flex-start;
  }
  .use-card + .use-card { margin-top: 12px; }
  .use-glyph {
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--accent-alpha-12);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .use-glyph .material-symbols-rounded { font-size: 28px; }
  .use-body .use-title {
    font: 600 16px/22px var(--font-sans);
    color: var(--fg);
    letter-spacing: 0;
    text-wrap: pretty;
  }
  .use-body .use-quote {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--bg-elev-2);
    border-radius: var(--radius-md);
    font: 400 13px/20px var(--font-sans);
    color: var(--fg);
    letter-spacing: .15px;
    text-wrap: pretty;
  }
  .use-body .use-quote .accent {
    color: var(--accent);
    font-weight: 500;
  }
  .use-body .use-meta {
    margin-top: 8px;
    font: 400 11px/14px var(--font-mono);
    letter-spacing: .4px;
    color: var(--fg-subtle);
    display: flex; align-items: center; gap: 6px;
  }

  /* ======== Step 4 — Health Connect dataflow diagram ======== */
  .flow-diagram {
    margin: 24px -4px 4px;
    padding: 20px 12px;
    background: var(--bg-elev-1);
    border-radius: var(--radius-2xl);
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }
  .flow-node {
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    gap: 8px;
    padding: 4px;
  }
  .flow-node .flow-circle {
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--bg-elev-2);
    color: var(--fg);
    display: flex; align-items: center; justify-content: center;
  }
  .flow-node.dest .flow-circle {
    background: var(--accent-alpha-12);
    color: var(--accent);
    box-shadow: inset 0 0 0 1.5px var(--accent);
  }
  .flow-node .flow-circle .material-symbols-rounded { font-size: 26px; }
  .flow-node .flow-label {
    font: 500 12px/16px var(--font-sans);
    color: var(--fg);
    letter-spacing: .15px;
  }
  .flow-node .flow-sub {
    font: 400 10px/14px var(--font-mono);
    letter-spacing: .4px;
    color: var(--fg-subtle);
  }
  .flow-arrow {
    display: flex; align-items: center;
    color: var(--accent);
  }
  .flow-arrow .material-symbols-rounded { font-size: 20px; }

  .flow-caption {
    margin-top: 14px;
    text-align: center;
    font: 500 11px/16px var(--font-sans);
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--accent-alpha-12);
  }
  .flow-caption-wrap { display: flex; justify-content: center; margin-top: 16px; }

  /* Read-only callout list */
  .promise-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .promise {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 12px;
    align-items: flex-start;
  }
  .promise .pmark {
    width: 32px; height: 32px; border-radius: 999px;
    background: var(--accent-alpha-12); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: -2px;
  }
  .promise .pmark .material-symbols-rounded { font-size: 18px; }
  .promise .ptext {
    font: 400 14px/22px var(--font-sans);
    color: var(--fg);
    letter-spacing: .15px;
    text-wrap: pretty;
  }
  .promise .ptext small {
    display: block;
    font: 400 12px/18px var(--font-sans);
    color: var(--fg-subtle);
    margin-top: 2px;
  }

  /* Health Connect not-installed fallback */
  .install-card {
    margin-top: 16px;
    padding: 16px;
    background: var(--bg-elev-2);
    border-radius: var(--radius-lg);
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 12px; align-items: center;
  }
  .install-card .icon-box {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--bg-elev-3); color: var(--fg);
    display: flex; align-items: center; justify-content: center;
  }
  .install-card .it { font: 500 13px/18px var(--font-sans); color: var(--fg); }
  .install-card .is { font: 400 12px/18px var(--font-sans); color: var(--fg-subtle); margin-top: 2px; }
  .install-card .iaction {
    background: transparent; border: 1px solid var(--border-strong);
    color: var(--fg); cursor: pointer;
    height: 36px; padding: 0 14px; border-radius: 999px;
    font: 500 12px/16px var(--font-sans); letter-spacing: .5px;
  }
  .install-card .iaction:hover { background: var(--bg-elev-3); }

  /* Permission state row */
  .perm-state {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--radius-lg);
    background: var(--accent-alpha-12);
    display: flex; align-items: flex-start; gap: 12px;
    color: var(--fg);
    font: 400 13px/20px var(--font-sans);
    letter-spacing: .15px;
  }
  .perm-state .material-symbols-rounded { color: var(--accent); font-size: 20px; flex-shrink: 0; margin-top: 1px; }

  /* ======== Step 5 — Confirmation ======== */
  .confirm-hero {
    margin: 16px -8px 0;
    padding: 32px 24px;
    border-radius: var(--radius-2xl);
    background:
      radial-gradient(ellipse at 50% 0%, rgba(76,175,125,0.18), rgba(76,175,125,0) 60%),
      var(--bg-elev-1);
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    gap: 16px;
  }
  .confirm-orb {
    width: 96px; height: 96px;
    border-radius: 999px;
    background: radial-gradient(circle at 32% 28%, rgba(168,240,203,0.85), var(--accent) 55%, var(--seed-sage-dark));
    box-shadow: 0 0 60px rgba(76,175,125,0.45), inset 0 0 24px rgba(168,240,203,0.4);
    position: relative;
    animation: orb-breath 6s ease-in-out infinite;
  }
  .confirm-orb::after {
    content: "";
    position: absolute; inset: -18px;
    border-radius: 999px;
    border: 1px solid rgba(76,175,125,0.25);
  }
  @keyframes orb-breath {
    0%, 100% { transform: scale(0.92); }
    50%      { transform: scale(1.04); }
  }
  .confirm-h1 {
    font: 600 26px/32px var(--font-display);
    letter-spacing: -.2px;
    color: var(--fg);
    text-wrap: pretty;
    max-width: 320px;
  }
  .confirm-sub {
    font: 400 14px/22px var(--font-sans);
    color: var(--fg-subtle);
    max-width: 320px;
    text-wrap: pretty;
  }

  .summary-card {
    margin-top: 16px;
    background: var(--bg-elev-1);
    border-radius: var(--radius-2xl);
    padding: 20px;
  }
  .summary-card .stitle {
    font: 600 14px/20px var(--font-sans);
    color: var(--fg);
  }
  .summary-card .ssub {
    font: 400 12px/18px var(--font-sans);
    color: var(--fg-subtle);
    margin-top: 2px;
  }
  .summary-chips {
    margin-top: 14px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .schip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--accent-alpha-12);
    color: var(--accent);
    font: 500 11px/14px var(--font-sans);
    letter-spacing: .5px;
  }
  .schip .material-symbols-rounded { font-size: 14px; }
  .schip.muted {
    background: var(--bg-elev-2);
    color: var(--fg-subtle);
  }

  /* ======== Generic helpers ======== */
  .fade-enter { animation: fade-up 480ms var(--ease-emphasized-decel) both; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fineprint {
    color: var(--fg-subtle);
    font: 400 12px/18px var(--font-sans);
    letter-spacing: .25px;
    margin-top: 20px;
    text-wrap: pretty;
  }
  .fineprint .link {
    color: var(--accent); text-decoration: none; cursor: pointer;
  }
  .fineprint .link:hover { text-decoration: underline; }

  /* Visually-hidden helper for live regions */
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .breath-wave, .confirm-orb, .dots .dot, .switch, .switch::after, .fade-enter {
      animation: none !important;
      transition-duration: 0.001ms !important;
    }
  }

  /* 768px tablet adjustments */
  @media (min-width: 768px) {
    .page { padding: 24px 32px 32px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

/* ===========================================================
   Icon helper
   =========================================================== */
function Icon({ name, size, fill, weight }) {
  const style = {};
  if (size) style.fontSize = size + 'px';
  const variation = [];
  if (weight) variation.push(`'wght' ${weight}`);
  if (fill !== undefined) variation.push(`'FILL' ${fill ? 1 : 0}`);
  if (variation.length) style.fontVariationSettings = variation.join(',');
  return <span className="material-symbols-rounded" style={style} aria-hidden="true">{name}</span>;
}

/* ===========================================================
   Data types — phrased for mental wellbeing, NOT fitness
   =========================================================== */
const DATA_TYPES = [
  {
    id: 'hr',
    name: 'Heart rate',
    icon: 'favorite',
    why: 'Notice when something stirs you — meditation, a hard conversation, a song.',
    explain: 'Beat-per-minute samples taken across the day. We never alert on a value — only use it as context when you reflect.',
  },
  {
    id: 'hrv',
    name: 'Heart rate variability',
    icon: 'monitor_heart',
    why: 'Helps us see your real stress levels, sometimes before you feel them.',
    explain: 'HRV is the small variation between heartbeats. Higher tends to mean a more flexible nervous system; lower can mean fatigue or strain.',
  },
  {
    id: 'sleep',
    name: 'Sleep',
    icon: 'bedtime',

function PagerTop({ step, total, onBack, onSkip, skipLabel = 'Skip for now' }) {
  return (
    <div className="pager-top">
      <button
        className="icon-btn"
        onClick={onBack}
        disabled={step === 0}
        aria-label="Back"
      >
        {step > 0 && <Icon name="arrow_back" />}
      </button>
      <div className="dots" role="tablist" aria-label="Onboarding progress">
        {Array.from({ length: total }).map((_, i) => (
          <span
            key={i}
            className={`dot ${i === step ? 'active' : ''} ${i < step ? 'passed' : ''}`}
            role="tab"
            aria-selected={i === step}
            aria-label={`Step ${i + 1} of ${total}`}
          />
        ))}
      </div>
      {onSkip ? (
        <button className="skip-link" onClick={onSkip} aria-label={skipLabel}>
          {skipLabel}
        </button>
      ) : (
        <span style={{ width: 44 }} />
      )}

  );
}

function BreathWaveVisual() {
  // Animated breathing waveform — SVG path, no foto-realistic device
  const [t, setT] = useState(0);
  const reduced = useRef(typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  useEffect(() => {
    if (reduced.current) return;
    let raf;
    const start = performance.now();
    const tick = (now) => {
      setT((now - start) / 1000);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  // Two waveforms, slow breath rhythm (~5.5s in / 5.5s out)
  const W = 360, H = 200;
  const buildPath = (phase, amp) => {
    const pts = [];
    for (let x = 0; x <= W; x += 6) {
      const k = x / W;
      // base sine + slow breath modulation
      const breath = Math.sin((t + phase) * (Math.PI / 5.5));
      const y = H / 2 + Math.sin(k * Math.PI * 4 + t * 1.2 + phase) * (amp * (0.5 + 0.5 * breath));
      pts.push(`${x},${y.toFixed(1)}`);
    }
    return 'M' + pts.join(' L');
  };

  // bead travels along main wave
  const beadX = ((t * 60) % (W + 40)) - 20;
  const beadKBead = beadX / W;
  const beadBreath = Math.sin(t * (Math.PI / 5.5));
  const beadY = H / 2 + Math.sin(beadKBead * Math.PI * 4 + t * 1.2) * (28 * (0.5 + 0.5 * beadBreath));

  return (
    <div className="breath-visual" aria-hidden="true">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid slice">
        <path className="breath-wave faint" d={buildPath(2.2, 40)} />
        <path className="breath-wave faint" d={buildPath(1.0, 36)} />
        <path className="breath-wave" d={buildPath(0, 28)} />
        <circle className="breath-bead" cx={beadX} cy={beadY} r="4.5" />
      </svg>
    </div>
  );
}

/* ===========================================================

function StepDataTypes({ enabled, setEnabled, onContinue, onBack, onSkip }) {

  const allOn = DATA_TYPES.every(d => enabled[d.id]);
  const someOn = DATA_TYPES.some(d => enabled[d.id]);

  const toggleAll = () => {
    if (allOn) {
      const next = {};
      DATA_TYPES.forEach(d => { next[d.id] = false; });
      setEnabled(next);
    } else {
      const next = {};
      DATA_TYPES.forEach(d => { next[d.id] = true; });
      setEnabled(next);
    }
  };

  return (
    <div data-screen-label="02 Data Types" style={{ display: 'flex', flexDirection: 'column', flex: 1 }}>
      <PagerTop step={1} total={5} onBack={onBack} onSkip={onSkip} />

            <span className="material-symbols-rounded" style={{ fontSize: 14 }} aria-hidden="true">help</span>
          </span>

        </p>

        <div className="quick-toggle" role="group" aria-label="Toggle all signals">
          <div>
            <div className="qtxt">{allOn ? 'All signals on' : someOn ? `${Object.values(enabled).filter(Boolean).length} of ${DATA_TYPES.length} on` : 'All signals off'}</div>
            <div className="qsub">Granular by default — turn just what you want.</div>
          </div>
          <button
            type="button"
            className={`switch ${allOn ? 'on' : ''}`}
            onClick={toggleAll}
            role="switch"
            aria-checked={allOn}
            aria-label={allOn ? 'Turn all signals off' : 'Turn all signals on'}
          />
        </div>

        <div className="card" style={{ marginTop: 12, padding: 12 }}>
          <div className="data-list" role="list">
            {DATA_TYPES.map((d) => {
              const on = !!enabled[d.id];
              const open = openId === d.id;
              return (
                <React.Fragment key={d.id}>
                  <div className={`data-row ${on ? 'on' : ''}`} role="listitem">
                    <div className="data-icon"><Icon name={d.icon} /></div>
                    <div className="data-meta">
                      <div className="name">{d.name}</div>
                      <div className="why">{d.why}</div>
                    </div>
                    <button
                      className="info-btn"
                      onClick={() => setOpenId(open ? null : d.id)}
                      aria-expanded={open}
                      aria-label={`What is ${d.name}?`}
                    >
                      <Icon name={open ? 'close' : 'help'} />
                    </button>
                    <div className="switch-wrap">
                      <button
                        type="button"
                        className={`switch ${on ? 'on' : ''}`}
                        onClick={() => setEnabled({ ...enabled, [d.id]: !on })}
                        role="switch"
                        aria-checked={on}
                        aria-label={`${d.name} ${on ? 'on' : 'off'}`}
                      />
                    </div>
                    {open && (
                      <div className="info-panel" role="region" aria-label={`About ${d.name}`}>
                        {d.explain}
                      </div>
                    )}
                  </div>
                </React.Fragment>

        <p className="fineprint">

  const enabledList = DATA_TYPES.filter(d => enabled[d.id]);
  const skippedAll = !granted || enabledList.length === 0;

  return (
    <div data-screen-label="05 Confirm" style={{ display: 'flex', flexDirection: 'column', flex: 1 }}>
      <PagerTop step={4} total={5} onBack={onBack} onSkip={null} />

        <div className="confirm-hero">
          <div className="confirm-orb" aria-hidden="true" />
          <h1 className="confirm-h1">

          <p className="confirm-sub">
            {skippedAll
              ? 'Calmify works beautifully without any of this. You can turn on bio signals from Settings whenever — or never — you like.'

        <div className="summary-card">
          <div className="stitle">

              ? 'No signals are being read. Nothing has changed about your experience.'
              : 'Granular as you set them. Change any of these anytime.'}

/* ===========================================================
   ROOT — pager state machine
   =========================================================== */
function App() {
  const [step, setStep] = useState(0);
  const [enabled, setEnabled] = useState({
    hr: true, hrv: true, sleep: true, steps: true,
    resting_hr: true, spo2: false, activity: true,
  });
  const [hcInstalled, setHcInstalled] = useState(true);
  const [granted, setGranted] = useState(false);
  const [skipped, setSkipped] = useState(false);

  // aria-live region for step changes
  const liveRef = useRef(null);

  const total = 5;
  const next = () => setStep(s => Math.min(total - 1, s + 1));
  const back = () => setStep(s => Math.max(0, s - 1));
  const skipToEnd = () => { setSkipped(true); setStep(4); };
  const finish = () => {
    // In a real app, navigate to home. Here, reset for re-preview.
    setStep(0); setGranted(false); setSkipped(false);
  };

  useEffect(() => {
    if (liveRef.current) {
      liveRef.current.textContent = `Step ${step + 1} of ${total}`;
    }
  }, [step]);

  return (
    <div className="app">
      <span ref={liveRef} className="sr-only" aria-live="polite" />
      {step === 0 && (
        <StepIntro
          onContinue={next}
          onSkip={skipToEnd}
        />
      )}
      {step === 1 && (
        <StepDataTypes
          enabled={enabled}
          setEnabled={setEnabled}
          onContinue={next}
          onBack={back}
          onSkip={skipToEnd}
        />
      )}
      {step === 2 && (
        <StepWhy
          onContinue={next}
          onBack={back}
          onSkip={skipToEnd}
        />
      )}
      {step === 3 && (
        <StepPermission
          hcInstalled={hcInstalled}
          setHcInstalled={setHcInstalled}
          granted={granted}
          setGranted={setGranted}
          onContinue={next}
          onBack={back}
          onSkip={skipToEnd}
        />
      )}
      {step === 4 && (
        <StepConfirm
          granted={granted && !skipped}
          enabled={enabled}
          onDone={finish}
          onBack={back}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
