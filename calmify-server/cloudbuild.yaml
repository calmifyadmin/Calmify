steps:
  # Build container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/calmify-server:$COMMIT_SHA', '-f', 'calmify-server/Dockerfile', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/calmify-server:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'calmify-server'
      - '--image=gcr.io/$PROJECT_ID/calmify-server:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,APP_VERSION=$COMMIT_SHA'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/calmify-server:$COMMIT_SHA'

timeout: '600s'
