substitutions:
  _TAG: 'latest'

steps:
  # Build container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/calmify-server:${_TAG}', '-f', 'calmify-server/Dockerfile', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/calmify-server:${_TAG}']

  # Deploy to Cloud Run with secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'calmify-server'
      - '--image=gcr.io/$PROJECT_ID/calmify-server:${_TAG}'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest'
      - '--service-account=calmify-server@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/calmify-server:${_TAG}'

timeout: '1800s'
